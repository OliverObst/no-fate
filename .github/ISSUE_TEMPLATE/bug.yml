name: Bug report
description: Report reproducible incorrect behaviour in No Fate.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Please remove private or identifying
        site content and provide a minimal fictional reproduction where possible.

  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Describe the observed and expected behaviour.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: List the steps, front matter, and configuration needed to reproduce the issue.
      placeholder: |
        1. Create a page with...
        2. Set visual.mode to...
        3. Build with...
    validations:
      required: true

  - type: input
    id: no_fate_version
    attributes:
      label: No Fate version
      description: Provide a release tag or full commit SHA.
      placeholder: v0.1.0 or a full commit SHA
    validations:
      required: true

  - type: input
    id: hugo_version
    attributes:
      label: Hugo version
      description: Paste the output of `hugo version`.
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Affected browser or output
      multiple: true
      options:
        - Not browser-specific
        - Firefox
        - Chrome or Chromium
        - Safari
        - Microsoft Edge
        - RSS or other generated output

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste relevant build output. It will be formatted automatically.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed private and identifying content from this report.
          required: true
