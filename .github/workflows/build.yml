name: Hugo build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hugo-build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Hugo ${{ matrix.edition }} ${{ matrix.hugo-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - hugo-version: "0.158.0"
            edition: standard
            package-prefix: hugo
          - hugo-version: "0.164.0"
            edition: standard
            package-prefix: hugo
          - hugo-version: "0.164.0"
            edition: extended
            package-prefix: hugo_extended

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Hugo
        env:
          HUGO_VERSION: ${{ matrix.hugo-version }}
          HUGO_PACKAGE_PREFIX: ${{ matrix.package-prefix }}
        run: |
          package="${HUGO_PACKAGE_PREFIX}_${HUGO_VERSION}_linux-amd64.deb"
          url="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${package}"
          wget --quiet --output-document="${RUNNER_TEMP}/${package}" "${url}"
          sudo dpkg --install "${RUNNER_TEMP}/${package}"
          hugo version

      - name: Build drafts
        run: |
          hugo \
            --source exampleSite \
            --themesDir ../.. \
            --buildDrafts \
            --panicOnWarning \
            --gc \
            --cleanDestinationDir

      - name: Build production site
        run: |
          hugo \
            --source exampleSite \
            --themesDir ../.. \
            --minify \
            --panicOnWarning \
            --gc \
            --cleanDestinationDir

      - name: Check demonstration boundary
        run: bash .github/scripts/check-demo-boundary.sh

      - name: Check page modes
        run: bash .github/scripts/check-page-modes.sh exampleSite/public

      - name: Check editorial framework
        run: bash .github/scripts/check-editorial-framework.sh exampleSite/public
