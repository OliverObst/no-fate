{{- $pages := where site.RegularPages "Params.content.format" "project" -}}
{{- with first 3 $pages.ByDate.Reverse }}
<section class="nf-home-module" aria-labelledby="nf-work-heading">
    <div class="nf-home-module__heading">
        <h2 id="nf-work-heading">{{ i18n "nf_current_work" | default "Current work" }}</h2>
    </div>
    <div class="nf-home-module__items">
        {{- range . }}{{ partial "record/entry.html" . }}{{ end }}
    </div>
</section>
{{- end }}
