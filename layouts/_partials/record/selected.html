<article class="post-entry nf-entry nf-entry--selected">
    <p class="nf-component__label">
        {{- with .Params.content.format }}{{ . | humanize }}{{ else }}{{ .Kind | humanize }}{{ end -}}
    </p>
    <h3 class="nf-entry__title"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
    {{- with .Params.subtitle }}
    <p class="post-description">{{ . }}</p>
    {{- else }}
        {{- with .Summary }}<p class="entry-content">{{ . | plainify }}</p>{{ end }}
    {{- end }}
</article>
