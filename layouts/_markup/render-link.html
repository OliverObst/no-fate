{{- $url := urls.Parse .Destination -}}
<a href="{{ .Destination | safeURL }}"
    {{- with .Title }} title="{{ . }}"{{ end -}}
    {{- if $url.IsAbs }} rel="external"{{ end -}}>
    {{- .Text -}}
    {{- if $url.IsAbs }}<span class="nf-external-mark" aria-hidden="true"> ↗</span>{{ end -}}
    {{- if $url.IsAbs }}<span class="nf-visually-hidden"> ({{ i18n "nf_external_link" | default "External link" }})</span>{{ end -}}
</a>
{{- /* Chomp trailing whitespace for adjacent inline elements. */ -}}
